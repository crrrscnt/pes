services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pes_db
      POSTGRES_USER: pes_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pes_user -d pes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://pes_user:dev_password@postgres:5432/pes_db
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost:5173
    env_file:
      - ./backend/env.example

  worker:
    build: ./backend
    command: rq worker --url redis://redis:6379/0 pes_queue
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://pes_user:dev_password@postgres:5432/pes_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/env.example
    deploy:
      replicas: 2

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
